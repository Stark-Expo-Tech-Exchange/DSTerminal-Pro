<!DOCTYPE html>
<html>
<head>
    <title>SOC Terminal - Boxed Prompt</title>
    <style>
        body {
            background: #0a0e17;
            font-family: 'Courier New', 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .terminal-box {
            background: #0f1118;
            border: 1px solid #2a2f3f;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            width: 900px;
            max-width: 100%;
        }
        .warning-bar {
            background: #1e1a0c;
            color: #ffd966;
            padding: 10px 16px;
            font-size: 13px;
            border-bottom: 1px solid #332a14;
            border-radius: 12px 12px 0 0;
        }
        .content {
            padding: 20px;
            color: #e0e4f0;
        }
        .status-line {
            font-size: 14px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #2a2f3f;
        }
        .timestamp { color: #6c7a89; }
        .host { color: #00d4ff; }
        .env { color: #2ecc71; }
        .severity { color: #2ecc71; font-weight: bold; }
        .session { color: #6c7a89; }
        .op-id { color: #3498db; }
        .at { color: #6c7a89; }
        .tool { color: #9b59b6; }
        .prompt-sigil { color: white; font-weight: bold; }
        .command-line {
            background: #0a0c12;
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
        }
        .command-input {
            background: transparent;
            border: none;
            color: #00ffaa;
            font-family: inherit;
            font-size: 14px;
            width: 80%;
            outline: none;
        }
        .output {
            margin: 12px 0;
            padding: 8px;
            background: #080b10;
            border-left: 3px solid #3498db;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .separator {
            border-top: 1px solid #2a2f3f;
            margin: 12px 0;
        }
    </style>
</head>
<body>
<div class="terminal-box">
    <div class="warning-bar">
        [!] Warning: Running without administrator privileges. Some features may be limited.
    </div>
    <div class="content">
        <div class="status-line">
            <span class="timestamp">[06:53:01]</span>
            <span class="host"> WILSON-SON</span>
            <span class="env"> [PROD]</span>
            <span class="severity"> NORMAL</span>
            <span class="session"> [SESSION-4C5C6]</span>
        </div>

        <div class="command-line">
            <span class="op-id">🔹 OP-BC9C01</span>
            <span class="at"> @ </span>
            <span class="tool">soc-terminal</span>
            <span> : ~$ </span>
            <input type="text" class="command-input" id="cmdInput" placeholder="investigate 8.8.8.8" autofocus>
        </div>

        <div id="outputArea"></div>
    </div>
</div>

<script>
    const inputField = document.getElementById('cmdInput');
    const outputArea = document.getElementById('outputArea');

    function addOutput(text, isCommand = false) {
        const div = document.createElement('div');
        div.className = isCommand ? '' : 'output';
        div.style.marginBottom = '10px';
        div.style.fontSize = '13px';
        div.style.color = isCommand ? '#88ffaa' : '#cccccc';
        div.innerHTML = isCommand ? `$ ${text}` : text;
        outputArea.appendChild(div);
        outputArea.scrollTop = outputArea.scrollHeight;
    }

    inputField.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const cmd = this.value.trim();
            if (cmd === '') return;
            
            addOutput(cmd, true);
            
            // Simulate SOC responses
            setTimeout(() => {
                if (cmd.toLowerCase().startsWith('investigate')) {
                    addOutput('[06:53:04] [+] Threat Intel: 3 hits');
                    addOutput('[06:53:04] [⚠️]  Indicator: Cobalt Strike beacon');
                    addOutput('[06:53:04] [🟡]  Severity: HIGH');
                    addOutput('[06:53:04] [+] Recommended: block 10.12.45.2 --ttl 3600');
                } else if (cmd.toLowerCase().startsWith('block')) {
                    addOutput('[06:53:11] [✅] Blocked via FW policy ID 8901');
                    addOutput('[06:53:11] [📋] IOC added to active blocklist (expires in 1h)');
                } else {
                    addOutput(`[06:53:10] [❓] Unknown command: ${cmd}`);
                }
            }, 300);
            
            this.value = '';
        }
    });
</script>
</body>
</html>
